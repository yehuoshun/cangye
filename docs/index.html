<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>藏叶 — 知识库导航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Segoe UI',sans-serif;background:#f7f8fa;color:#333;height:100vh;overflow:hidden}
#app{display:flex;height:100%}
.sidebar{width:220px;min-width:220px;background:#fff;border-right:1px solid #e8e8e8;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:16px;font-size:16px;font-weight:700;color:#333;border-bottom:1px solid #eee;display:flex;align-items:center;gap:8px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-nav .cat-item{padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;color:#555;transition:all .12s;border-left:3px solid transparent}
.sidebar-nav .cat-item:hover{background:#f0f0f5;color:#333}
.sidebar-nav .cat-item.active{background:#e8e8f6;color:#2a4a7a;font-weight:600;border-left-color:#5a5aaa}
.sidebar-nav .cat-count{margin-left:auto;font-size:11px;color:#999;background:#eee;padding:1px 7px;border-radius:10px}
.sidebar-footer{padding:12px 16px;border-top:1px solid #eee;font-size:11px;color:#aaa;text-align:center}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f7f8fa}
.toolbar{display:flex;align-items:center;gap:12px;padding:16px 24px;background:#fff;border-bottom:1px solid #eee}
.toolbar input{flex:1;max-width:360px;padding:8px 14px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;background:#f7f8fa;transition:border .2s}
.toolbar input:focus{border-color:#5a5aaa;background:#fff}
.toolbar .btn{padding:7px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;color:#666;white-space:nowrap;transition:all .15s}
.toolbar .btn:hover{background:#f0f0f5;border-color:#ccc}
.toolbar .btn.danger{color:#c44;border-color:#ecc}
.toolbar .btn.danger:hover{background:#fff0f0}
.toolbar .info{font-size:12px;color:#aaa;white-space:nowrap}
.content{flex:1;overflow-y:auto;padding:20px 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{padding:16px 18px;background:#fff;border:1px solid #eee;border-radius:10px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column}
.card:hover{border-color:#aab;box-shadow:0 2px 12px rgba(0,0,0,0.06);transform:translateY(-1px)}
.card .name{font-size:14px;font-weight:600;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .meta{font-size:12px;color:#999;margin-top:6px;display:flex;gap:16px;align-items:center}
.card .badge{display:inline-block;font-size:11px;padding:2px 10px;border-radius:10px;background:#f0f0f5;color:#777;margin-top:8px;width:fit-content}
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;font-size:14px}
.empty{text-align:center;padding:60px;color:#aaa}
.empty .icon{font-size:48px;margin-bottom:12px}
.kbd{display:inline-block;background:#eee;border:1px solid #ddd;border-radius:4px;padding:1px 6px;font-size:11px;color:#888;font-family:monospace;margin:0 2px}
@media(prefers-color-scheme:dark){
  body{background:#1a1a2e;color:#ccc}
  .sidebar{background:#16162a;border-color:#333}
  .sidebar-header{color:#ccc;border-color:#333}
  .sidebar-nav .cat-item{color:#999}
  .sidebar-nav .cat-item:hover{background:#252545;color:#ccc}
  .sidebar-nav .cat-item.active{background:#2a2a5a;color:#99b;border-color:#5a5aaa}
  .main{background:#1a1a2e}
  .toolbar{background:#1e1e30;border-color:#333}
  .toolbar input{background:#252540;border-color:#444;color:#ccc}
  .toolbar input:focus{background:#2a2a50}
  .toolbar .btn{background:#252540;border-color:#444;color:#aaa}
  .toolbar .btn:hover{background:#2a2a5a}
  .card{background:#252540;border-color:#333}
  .card:hover{background:#2a2a50;border-color:#5a5a8a}
  .card .name{color:#ccc}
}
</style>
</head>
<body>
<div id="app"><div class="loading">加载中...</div></div>

<script>
const JSON_URL = 'https://cdn.jsdelivr.net/gh/yehuoshun/cangye@main/yuque-repos.json'
const LOCAL_KEY = 'yuque_repos_cache_v1'
const CACHE_TTL = 24*60*60*1000

async function loadRepos() {
  const cached = localStorage.getItem(LOCAL_KEY)
  if (cached) {
    try {
      const p = JSON.parse(cached)
      if (Date.now() - p.ts < CACHE_TTL && p.data?.length > 0) return p.data
    } catch {}
  }
  try {
    const resp = await fetch(JSON_URL, { cache: 'no-cache' })
    if (!resp.ok) throw Error(resp.status)
    const json = await resp.json()
    const data = json.repos || []
    localStorage.setItem(LOCAL_KEY, JSON.stringify({ ts: Date.now(), data }))
    return data
  } catch (e) {
    console.warn('[cangye] fetch failed:', e)
    if (cached) return JSON.parse(cached).data
    return []
  }
}

let repos = []
let currentCat = '__all__'
let searchQuery = ''

function getCats(repos) {
  const map = {}
  repos.forEach(r => {
    const c = r.category || '其他'
    if (!map[c]) map[c] = []
    map[c].push(r)
  })
  return Object.entries(map).sort((a,b) => b[1].length - a[1].length)
}

function getFiltered() {
  let list = currentCat === '__all__' ? repos : repos.filter(r => (r.category||'其他') === currentCat)
  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase()
    list = list.filter(r => r.name.toLowerCase().includes(q))
  }
  return list
}

function render() {
  const cats = getCats(repos)
  const filtered = getFiltered()
  const updateTime = localStorage.getItem(LOCAL_KEY)
    ? new Date(JSON.parse(localStorage.getItem(LOCAL_KEY)).ts).toLocaleString('zh-CN')
    : ''

  document.getElementById('app').innerHTML = `
    <div class="sidebar">
      <div class="sidebar-header">🍃 藏叶</div>
      <div class="sidebar-nav">
        <div class="cat-item${currentCat==='__all__'?' active':''}" data-cat="__all__">📋 全部 <span class="cat-count">${repos.length}</span></div>
        ${cats.map(([name, items]) => `
          <div class="cat-item${currentCat===name?' active':''}" data-cat="${name}">📁 ${name} <span class="cat-count">${items.length}</span></div>
        `).join('')}
      </div>
      <div class="sidebar-footer">${updateTime ? '更新: '+updateTime : ''}</div>
    </div>
    <div class="main">
      <div class="toolbar">
        <input id="search" placeholder="搜索知识库..." value="${searchQuery}" autofocus />
        <button class="btn" id="refresh">🔄 刷新</button>
        <span class="info">${filtered.length} 个知识库 · 快捷键 <span class="kbd">/</span> 搜索</span>
      </div>
      <div class="content">
        ${filtered.length === 0 ? `
          <div class="empty">
            <div class="icon">📭</div>
            <div>没有匹配的知识库</div>
          </div>
        ` : `
          <div class="grid">
            ${filtered.map(r => `
              <div class="card" data-url="https://www.yuque.com/${r.namespace}" title="${r.name}">
                <div class="name">${r.name}</div>
                <div class="meta">
                  <span>📄 ${r.items_count||0} 项</span>
                  <span>🕐 ${(r.updated_at||'').slice(0,10)}</span>
                </div>
                ${r.category ? `<div class="badge">${r.category}</div>` : ''}
              </div>
            `).join('')}
          </div>
        `}
      </div>
    </div>
  `

  // Events
  document.querySelectorAll('.cat-item').forEach(el => {
    el.addEventListener('click', () => {
      currentCat = el.dataset.cat
      render()
    })
  })
  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value
    render()
  })
  document.getElementById('refresh').addEventListener('click', () => {
    localStorage.removeItem(LOCAL_KEY)
    location.reload()
  })
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      window.open(card.dataset.url, '_blank')
    })
  })
  // Focus search
  document.getElementById('search').focus()
  // Keyboard shortcut
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
      e.preventDefault()
      document.getElementById('search').focus()
    }
  })
}

async function init() {
  repos = await loadRepos()
  if (repos.length === 0) {
    document.getElementById('app').innerHTML = '<div class="loading">加载失败，请刷新重试</div>'
    return
  }
  render()
}

init()
</script>
</body>
</html>
